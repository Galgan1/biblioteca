<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Minuto Real — links</title>
<meta name="description" content="Minuto Real — grandes livros, as ideias que ficam, em minutos. Resumos em vídeo no YouTube e cheat sheets na Biblioteca.">
<meta name="theme-color" content="#0b1410">
<meta property="og:title" content="Minuto Real">
<meta property="og:description" content="Grandes livros — as ideias que ficam, em minutos.">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@500;700;800&family=Literata:wght@700&display=swap" rel="stylesheet">
<style>
  :root{
    --green: oklch(70% 0.145 152); --green-soft: oklch(82% 0.11 152);
    --ink: oklch(97% 0.01 152); --muted: oklch(73% 0.02 152);
    --bg: oklch(15% 0.013 152); --surface: oklch(20% 0.018 152);
    --gold: oklch(80% 0.12 85); --on-green: oklch(15% 0.02 152);
    --hair: oklch(70% 0.05 152 / .28);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Hanken Grotesk',system-ui,sans-serif;color:var(--ink);
    background:radial-gradient(120% 70% at 50% -10%, oklch(23% 0.03 152) 0%, var(--bg) 60%);
    min-height:100dvh;display:flex;flex-direction:column;align-items:center;
    padding:56px 22px 40px;-webkit-font-smoothing:antialiased}
  .wrap{width:100%;max-width:520px;display:flex;flex-direction:column;align-items:center}
  .mark{width:128px;height:128px;border-radius:50%;border:3px solid var(--gold);
    background:oklch(13% 0.01 152);display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:2px}
  .mark .mr{font-family:'Literata',Georgia,serif;font-weight:700;font-size:56px;
    color:var(--ink);line-height:1;letter-spacing:.02em}
  .mark .nm{font-size:11px;letter-spacing:.22em;color:var(--gold);font-weight:800;text-transform:uppercase}
  h1{font-size:38px;font-weight:800;text-transform:uppercase;margin-top:24px;letter-spacing:.01em}
  .tag{color:var(--muted);font-size:17px;line-height:1.45;text-align:center;margin-top:12px;
    font-weight:600;max-width:380px}
  .links{width:100%;margin-top:38px;display:flex;flex-direction:column;gap:18px}
  a.link{display:flex;align-items:center;gap:18px;padding:22px 24px;border:2px dashed var(--green);
    border-radius:18px;background:var(--surface);color:var(--ink);text-decoration:none;
    transition:transform .12s ease, background .12s ease}
  a.link:active{transform:scale(.985)}
  @media(hover:hover){a.link:hover{background:oklch(24% 0.02 152)}}
  a.link .ic{flex:0 0 auto;width:46px;height:46px;color:var(--green)}
  a.link .ic svg{width:46px;height:46px;display:block}
  a.link .tx{display:flex;flex-direction:column}
  a.link .tt{font-weight:800;font-size:21px;letter-spacing:.01em}
  a.link .sb{font-size:14.5px;color:var(--muted);font-weight:600;margin-top:2px}
  a.link .go{margin-left:auto;color:var(--green-soft);font-size:26px;font-weight:800}
  footer{margin-top:auto;padding-top:40px;text-align:center;color:var(--muted);font-size:13px;line-height:1.6}
  footer .h{color:var(--green);font-weight:800;letter-spacing:.06em}
  a:focus-visible{outline:3px solid var(--green-soft);outline-offset:3px}
</style>
</head>
<body>
  <div class="wrap">
    <div class="mark"><span class="mr">MR</span><span class="nm">Minuto Real</span></div>
    <h1>Minuto Real</h1>
    <p class="tag">Grandes livros — as ideias que ficam, em minutos.</p>

    <nav class="links">
      <a class="link" href="https://www.youtube.com/channel/UC2N5xZ-gyCU3hNvH1QqNahA">
        <span class="ic"><svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="8" y="16" width="48" height="32" rx="9" stroke="currentColor" stroke-width="3"/><path d="M27 24l14 8-14 8z" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/></svg></span>
        <span class="tx"><span class="tt">YouTube</span><span class="sb">Resumos em vídeo (~5 min)</span></span>
        <span class="go">›</span>
      </a>
      <a class="link" href="https://www.andregalgani.com.br/biblioteca">
        <span class="ic"><svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M32 16C26 12 16 12 12 14v34c4-2 14-2 20 2 6-4 16-4 20-2V14c-4-2-14-2-20 2z" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/><path d="M32 18v34" stroke="currentColor" stroke-width="3"/></svg></span>
        <span class="tx"><span class="tt">Biblioteca</span><span class="sb">Cheat sheets + PDF dos livros</span></span>
        <span class="go">›</span>
      </a>
      <a class="link" href="https://www.andregalgani.com.br/biblioteca">
        <span class="ic"><svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 16h8l5 26h22l5-18H21" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><circle cx="27" cy="50" r="3.5" stroke="currentColor" stroke-width="3"/><circle cx="44" cy="50" r="3.5" stroke="currentColor" stroke-width="3"/></svg></span>
        <span class="tx"><span class="tt">🛒 Comprar na Amazon</span><span class="sb">Cada livro tem seu link na Biblioteca</span></span>
        <span class="go">›</span>
      </a>
    </nav>

    <footer>
      <div class="h">@minutoreal1701</div>
      Narração e arte por inteligência artificial.
    </footer>
  </div>
</body>
</html>
