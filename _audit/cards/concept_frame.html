<!doctype html>
<!--
  CONCEITO: "Moldura de Galeria" — o card de livro como obra emoldurada numa galeria de luxo.
  Substitui a borda TRACEJADA amadora por um acabamento de moldura caro: um FILETE FINO (1px)
  de ouro/verde-escuro emoldura a capa, com PASSE-PARTOUT (margem interna clara) ao redor da
  obra, como uma gravura montada. O OURO (--gold, hue 83) é o acento premium e raro — vive na
  linha de tinta do passe-partout, no número de curtidas e num filete de cabeçalho. Título em
  Literata (serifa editorial). Restrição total: nenhuma cor fora dos tokens da marca.
  Card todo clicável (o <a> envolve tudo). On-brand verde + ouro, mobile-first.
-->
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Biblioteca — Card "Moldura de Galeria"</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=Literata:ital,opsz,wght@0,7..72,500;0,7..72,600;1,7..72,500&display=swap" rel="stylesheet">
<style>
  :root{
    /* ── Tokens da marca (idênticos ao assets/style.css) ── */
    --green: oklch(52% 0.14 152);
    --green-dark: oklch(40% 0.12 152);
    --green-light: oklch(95% 0.03 152);
    --gold: oklch(60% 0.10 83);
    --gold-soft: oklch(72% 0.09 83);
    --black: oklch(22% 0.01 152);
    --gray-dark: oklch(46% 0.01 152);
    --paper-bg: oklch(99% 0.002 152);
    --radius: 6px;

    --font-display: 'Hanken Grotesk', system-ui, sans-serif;
    --font-serif: 'Literata', Georgia, serif;

    /* ── Derivados de moldura (só dos tokens acima, via color-mix) ── */
    --frame-line: color-mix(in oklch, var(--green-dark) 70%, var(--black)); /* filete verde-escuro */
    --mat: color-mix(in oklch, var(--paper-bg) 88%, var(--green-light));    /* passe-partout claro */
    --shadow-art: 0 1px 1px color-mix(in oklch, var(--black) 8%, transparent),
                  0 8px 22px color-mix(in oklch, var(--green-dark) 14%, transparent);
    --shadow-lift: 0 2px 4px color-mix(in oklch, var(--black) 10%, transparent),
                   0 16px 38px color-mix(in oklch, var(--green-dark) 22%, transparent);
  }

  *{ box-sizing: border-box; }
  html,body{ margin:0; }
  body{
    background: oklch(96% 0.005 152);
    color: var(--black);
    font-family: var(--font-display);
    -webkit-font-smoothing: antialiased;
    padding: 28px 0 56px;
  }
  .wrap{ max-width: 390px; margin: 0 auto; padding: 0 16px; }
  .lede{
    font-size: .72rem; letter-spacing: .14em; text-transform: uppercase;
    color: var(--gray-dark); text-align:center; margin: 0 0 22px;
  }
  .lede b{ color: var(--green-dark); }

  /* ── GRADE 2 colunas ── */
  .shelf{
    display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
  }

  /* ───────────────────────── CARD ───────────────────────── */
  .card{
    display:flex; flex-direction:column;
    text-decoration:none; color:inherit;
    background: var(--paper-bg);
    border-radius: var(--radius);
    border: 1px solid color-mix(in oklch, var(--green-dark) 14%, transparent);
    box-shadow: var(--shadow-art);
    overflow:hidden;
    transition: transform .22s cubic-bezier(.2,.7,.2,1), box-shadow .22s ease, border-color .22s ease;
  }
  .card:hover{
    transform: translateY(-4px);
    box-shadow: var(--shadow-lift);
    border-color: color-mix(in oklch, var(--gold) 50%, transparent);
  }
  .card:focus-visible{
    outline: 2px solid var(--green);
    outline-offset: 2px;
  }

  /* ── A MOLDURA: filete fino + passe-partout em volta da capa ── */
  .frame{
    margin: 12px 12px 0;
    padding: 9px;                          /* o passe-partout (mat) */
    background: var(--mat);
    border: 1px solid var(--frame-line);   /* FILETE verde-escuro, 1px */
    border-radius: 3px;
    position: relative;
    box-shadow: inset 0 0 0 3px var(--paper-bg),               /* janela do mat */
                inset 0 0 0 4px color-mix(in oklch, var(--gold) 38%, transparent); /* linha de tinta OURO */
  }
  .frame .cover{
    display:block; width:100%; aspect-ratio: 2/3; object-fit: cover;
    background: var(--green-light);
    border-radius: 1px;
    box-shadow: 0 1px 6px color-mix(in oklch, var(--black) 22%, transparent); /* a obra "assenta" no mat */
  }
  /* canto fino de galeria — pequenos esquadros de ouro nos vértices */
  .frame::before,.frame::after{
    content:""; position:absolute; width:11px; height:11px; pointer-events:none;
    border: 1.5px solid var(--gold-soft);
  }
  .frame::before{ top:-1px; left:-1px; border-right:0; border-bottom:0; border-top-left-radius:3px; }
  .frame::after{ bottom:-1px; right:-1px; border-left:0; border-top:0; border-bottom-right-radius:3px; }

  /* ── Placa / cartela (texto sob a obra) ── */
  .plate{ padding: 11px 13px 13px; display:flex; flex-direction:column; gap:3px; flex:1; }
  .title{
    font-family: var(--font-serif);
    font-weight: 600; font-size: .98rem; line-height: 1.18;
    letter-spacing:-.005em; color: var(--black);
    margin:0;
  }
  .author{
    font-size: .73rem; color: var(--gray-dark);
    letter-spacing:.01em; margin:0;
  }
  .author::before{
    /* travessão fino de ouro antes do autor — selo editorial */
    content:""; display:inline-block; width:13px; height:1px; vertical-align:middle;
    background: var(--gold); margin-right:6px; transform: translateY(-1px);
  }

  /* ── Rodapé: engajamento (ouro) + comprar (discreto) ── */
  .meta{
    margin-top: auto; padding-top: 10px;
    display:flex; align-items:center; justify-content:space-between;
    border-top: 1px solid color-mix(in oklch, var(--green-dark) 10%, transparent);
    margin-top: 11px;
  }
  .likes{
    display:inline-flex; align-items:center; gap:5px;
    font-size:.74rem; font-weight:600; color: var(--green-dark);
    font-variant-numeric: tabular-nums;
  }
  .likes svg{ width:13px; height:13px; color: var(--gold); fill: var(--gold); }
  .buy{
    font-size:.66rem; letter-spacing:.06em; text-transform:uppercase; font-weight:600;
    color: var(--gray-dark);
    display:inline-flex; align-items:center; gap:4px;
    transition: color .18s ease;
  }
  .buy svg{ width:11px; height:11px; }
  .card:hover .buy{ color: var(--green-dark); }
</style>
</head>
<body>
  <div class="wrap">
    <p class="lede">Estante · <b>Moldura de Galeria</b></p>

    <div class="shelf">

      <!-- 1984 -->
      <a class="card" href="#" aria-label="1984, de George Orwell — 412 curtidas">
        <div class="frame">
          <img class="cover" loading="lazy"
               src="https://www.andregalgani.com.br/biblioteca/assets/1984-capa.png"
               alt="Capa de 1984">
        </div>
        <div class="plate">
          <h3 class="title">1984</h3>
          <p class="author">George Orwell</p>
          <div class="meta">
            <span class="likes">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 21s-7.5-4.6-10-9.2C.4 8.6 1.9 5 5.3 5 7.2 5 8.5 6 12 9c3.5-3 4.8-4 6.7-4 3.4 0 4.9 3.6 3.3 6.8C19.5 16.4 12 21 12 21z"/></svg>
              412
            </span>
            <span class="buy">Comprar
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M7 7h11l-1 9H8L6 4H3"/><circle cx="9" cy="20" r="1"/><circle cx="17" cy="20" r="1"/></svg>
            </span>
          </div>
        </div>
      </a>

      <!-- Sapiens -->
      <a class="card" href="#" aria-label="Sapiens, de Yuval Noah Harari — 248 curtidas">
        <div class="frame">
          <img class="cover" loading="lazy"
               src="https://www.andregalgani.com.br/biblioteca/assets/sapiens-capa.png"
               alt="Capa de Sapiens">
        </div>
        <div class="plate">
          <h3 class="title">Sapiens</h3>
          <p class="author">Yuval Noah Harari</p>
          <div class="meta">
            <span class="likes">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 21s-7.5-4.6-10-9.2C.4 8.6 1.9 5 5.3 5 7.2 5 8.5 6 12 9c3.5-3 4.8-4 6.7-4 3.4 0 4.9 3.6 3.3 6.8C19.5 16.4 12 21 12 21z"/></svg>
              248
            </span>
            <span class="buy">Comprar
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M7 7h11l-1 9H8L6 4H3"/><circle cx="9" cy="20" r="1"/><circle cx="17" cy="20" r="1"/></svg>
            </span>
          </div>
        </div>
      </a>

      <!-- As Leis da Natureza Humana -->
      <a class="card" href="#" aria-label="As Leis da Natureza Humana, de Robert Greene — 189 curtidas">
        <div class="frame">
          <img class="cover" loading="lazy"
               src="https://www.andregalgani.com.br/biblioteca/assets/leis-da-natureza-humana-capa.png"
               alt="Capa de As Leis da Natureza Humana">
        </div>
        <div class="plate">
          <h3 class="title">As Leis da Natureza Humana</h3>
          <p class="author">Robert Greene</p>
          <div class="meta">
            <span class="likes">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 21s-7.5-4.6-10-9.2C.4 8.6 1.9 5 5.3 5 7.2 5 8.5 6 12 9c3.5-3 4.8-4 6.7-4 3.4 0 4.9 3.6 3.3 6.8C19.5 16.4 12 21 12 21z"/></svg>
              189
            </span>
            <span class="buy">Comprar
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M7 7h11l-1 9H8L6 4H3"/><circle cx="9" cy="20" r="1"/><circle cx="17" cy="20" r="1"/></svg>
            </span>
          </div>
        </div>
      </a>

    </div>
  </div>
</body>
</html>
