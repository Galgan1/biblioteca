<!doctype html>
<!-- PORTE do conceito "Moldura de Galeria" para a ESTRUTURA REAL do site
     (shelf-item > a.card > card-cover/card-content + card-buy + card-vote).
     Este CSS é o que vou portar pro assets/style.css. -->
<html lang="pt-BR"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=Literata:ital,opsz,wght@0,7..72,500;0,7..72,600;1,7..72,500&display=swap" rel="stylesheet">
<style>
:root{
  --green: oklch(52% 0.14 152); --green-dark: oklch(40% 0.12 152);
  --green-light: oklch(95% 0.03 152); --gold: oklch(60% 0.10 83); --gold-soft: oklch(72% 0.09 83);
  --black: oklch(22% 0.01 152); --gray-dark: oklch(46% 0.01 152); --paper-bg: oklch(99% 0.002 152);
  --radius: 6px; --font-display:'Hanken Grotesk',system-ui,sans-serif; --font-serif:'Literata',Georgia,serif;
  --frame-line: color-mix(in oklch, var(--green-dark) 65%, var(--black));
  --mat: color-mix(in oklch, var(--paper-bg) 90%, var(--green-light));
  --shadow-art: 0 1px 1px color-mix(in oklch,var(--black) 8%,transparent), 0 8px 20px color-mix(in oklch,var(--green-dark) 13%,transparent);
  --shadow-lift: 0 2px 4px color-mix(in oklch,var(--black) 10%,transparent), 0 16px 36px color-mix(in oklch,var(--green-dark) 20%,transparent);
}
*{box-sizing:border-box} body{margin:0;background:oklch(96% 0.005 152);font-family:var(--font-display);color:var(--black);padding:28px 0 60px;-webkit-font-smoothing:antialiased}
.wrap{max-width:390px;margin:0 auto;padding:0 16px}
.lede{font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;color:var(--gray-dark);text-align:center;margin:0 0 22px}
.lede b{color:var(--green-dark)}
.shelf-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}

/* ───── CARD (a moldura vive no .shelf-item, que envolve card + buy + vote) ───── */
.shelf-item{
  position:relative; display:flex; flex-direction:column; min-width:0;
  background:var(--paper-bg); border-radius:var(--radius);
  border:1px solid color-mix(in oklch,var(--green-dark) 14%,transparent);
  box-shadow:var(--shadow-art); overflow:hidden;
  transition:transform .22s cubic-bezier(.2,.7,.2,1), box-shadow .22s ease, border-color .22s ease;
}
.shelf-item:hover{transform:translateY(-4px);box-shadow:var(--shadow-lift);border-color:color-mix(in oklch,var(--gold) 50%,transparent)}
.shelf-item > .card{display:flex;flex-direction:column;flex:1;text-decoration:none;color:inherit;min-width:0}
.shelf-item > .card:focus-visible{outline:2px solid var(--green);outline-offset:2px}

/* MOLDURA: filete + passe-partout + linha de ouro + esquadros (na card-cover) */
.card-cover{
  margin:12px 12px 0; padding:9px; background:var(--mat);
  border:1px solid var(--frame-line); border-radius:3px; position:relative;
  box-shadow:inset 0 0 0 3px var(--paper-bg), inset 0 0 0 4px color-mix(in oklch,var(--gold) 36%,transparent);
}
.card-cover img, .card-cover picture{display:block;width:100%}
.card-cover img{aspect-ratio:2/3;object-fit:cover;border-radius:1px;background:var(--green-light);
  box-shadow:0 1px 6px color-mix(in oklch,var(--black) 22%,transparent)}
.card-cover::before,.card-cover::after{content:"";position:absolute;width:11px;height:11px;pointer-events:none;border:1.5px solid var(--gold-soft)}
.card-cover::before{top:-1px;left:-1px;border-right:0;border-bottom:0;border-top-left-radius:3px}
.card-cover::after{bottom:-1px;right:-1px;border-left:0;border-top:0;border-bottom-right-radius:3px}

/* CARTELA (card-content): título serifado + autor com travessão de ouro */
.card-content{padding:11px 13px 4px;display:flex;flex-direction:column;gap:3px;flex:1;min-width:0}
.card-title{font-family:var(--font-serif);font-weight:600;font-size:.96rem;line-height:1.18;letter-spacing:-.005em;color:var(--black);margin:0;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-author{font-size:.73rem;color:var(--gray-dark);letter-spacing:.01em;margin:0}
.card-author::before{content:"";display:inline-block;width:13px;height:1px;vertical-align:middle;background:var(--gold);margin-right:6px;transform:translateY(-1px)}
.card-progress{display:none} /* o % lido não entra no card premium */

/* RODAPÉ: votos (engajamento, ouro) — fundo SÓLIDO papel */
.card-vote{display:flex;align-items:center;gap:10px;margin:8px 13px 12px;padding-top:9px;
  border-top:1px solid color-mix(in oklch,var(--green-dark) 10%,transparent)}
.vote-btn{display:inline-flex;align-items:center;gap:4px;border:0;background:none;cursor:pointer;padding:2px;
  font-family:inherit;font-size:.74rem;font-weight:600;font-variant-numeric:tabular-nums;color:var(--green-dark)}
.vote-btn svg{width:14px;height:14px}
.vote-up svg{color:var(--gold);fill:color-mix(in oklch,var(--gold) 25%,transparent)}
.vote-down{color:var(--gray-dark);font-weight:500;opacity:.6}
.vote-down svg{width:13px;height:13px}
.vote-count{line-height:1}

/* COMPRAR: discreto, overlay no canto da capa (aparece sempre, realça no hover) */
.card-buy{position:absolute;top:18px;right:18px;z-index:2;display:inline-flex;align-items:center;justify-content:center;
  width:30px;height:30px;border-radius:50%;background:color-mix(in oklch,var(--paper-bg) 86%,transparent);
  backdrop-filter:blur(4px);border:1px solid color-mix(in oklch,var(--green-dark) 18%,transparent);
  color:var(--green-dark);text-decoration:none;box-shadow:0 1px 4px color-mix(in oklch,var(--black) 14%,transparent);
  transition:background .18s,color .18s,transform .18s}
.card-buy span{display:none}
.card-buy svg{width:15px;height:15px}
.card-buy:hover{background:var(--green);color:var(--paper-bg);transform:scale(1.08)}
</style></head>
<body><div class="wrap">
<p class="lede">Estante · <b>Moldura de Galeria (estrutura real)</b></p>
<div class="shelf-grid">
  <div class="shelf-item"><a class="card" href="#">
    <div class="card-cover"><img src="https://www.andregalgani.com.br/biblioteca/assets/sapiens-capa.png" alt="Sapiens"></div>
    <div class="card-content"><div class="card-title">Sapiens</div><p class="card-author">Yuval Noah Harari</p><p class="card-progress">Resumo completo</p></div>
  </a>
    <a class="card-buy" href="#"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 4h2.5l2 11h10l2-8H7"/><circle cx="10" cy="20" r="1.5"/><circle cx="17" cy="20" r="1.5"/></svg><span>Comprar</span></a>
    <div class="card-vote">
      <button class="vote-btn vote-up"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 21s-7.5-4.6-10-9.2C.4 8.6 1.9 5 5.3 5 7.2 5 8.5 6 12 9c3.5-3 4.8-4 6.7-4 3.4 0 4.9 3.6 3.3 6.8C19.5 16.4 12 21 12 21z"/></svg><span class="vote-count">248</span></button>
      <button class="vote-btn vote-down"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 14V2M7 14l-4 4 4 4M3 18h13a4 4 0 0 0 4-4"/></svg><span class="vote-count">3</span></button>
    </div>
  </div>
  <div class="shelf-item"><a class="card" href="#">
    <div class="card-cover"><img src="https://www.andregalgani.com.br/biblioteca/assets/1984-capa.png" alt="1984"></div>
    <div class="card-content"><div class="card-title">1984</div><p class="card-author">George Orwell</p><p class="card-progress">Resumo completo</p></div>
  </a>
    <a class="card-buy" href="#"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 4h2.5l2 11h10l2-8H7"/><circle cx="10" cy="20" r="1.5"/><circle cx="17" cy="20" r="1.5"/></svg><span>Comprar</span></a>
    <div class="card-vote">
      <button class="vote-btn vote-up"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 21s-7.5-4.6-10-9.2C.4 8.6 1.9 5 5.3 5 7.2 5 8.5 6 12 9c3.5-3 4.8-4 6.7-4 3.4 0 4.9 3.6 3.3 6.8C19.5 16.4 12 21 12 21z"/></svg><span class="vote-count">412</span></button>
      <button class="vote-btn vote-down"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 14V2M7 14l-4 4 4 4M3 18h13a4 4 0 0 0 4-4"/></svg><span class="vote-count">1</span></button>
    </div>
  </div>
  <div class="shelf-item"><a class="card" href="#">
    <div class="card-cover"><img src="https://www.andregalgani.com.br/biblioteca/assets/leis-da-natureza-humana-capa.png" alt="Leis"></div>
    <div class="card-content"><div class="card-title">As Leis da Natureza Humana</div><p class="card-author">Robert Greene</p><p class="card-progress">Resumo completo</p></div>
  </a>
    <a class="card-buy" href="#"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 4h2.5l2 11h10l2-8H7"/><circle cx="10" cy="20" r="1.5"/><circle cx="17" cy="20" r="1.5"/></svg><span>Comprar</span></a>
    <div class="card-vote">
      <button class="vote-btn vote-up"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 21s-7.5-4.6-10-9.2C.4 8.6 1.9 5 5.3 5 7.2 5 8.5 6 12 9c3.5-3 4.8-4 6.7-4 3.4 0 4.9 3.6 3.3 6.8C19.5 16.4 12 21 12 21z"/></svg><span class="vote-count">189</span></button>
      <button class="vote-btn vote-down"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 14V2M7 14l-4 4 4 4M3 18h13a4 4 0 0 0 4-4"/></svg><span class="vote-count">0</span></button>
    </div>
  </div>
</div></div></body></html>
