<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kit de Divulgação — V5 · Tiles micro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;700;800&display=swap">
<link rel="stylesheet" href="../../assets/style.css">
<style>
    /* ---- Página de demonstração (fundo claro, papel) ---- */
    body {
        margin: 0;
        background: var(--paper-bg);
        color: var(--black);
        font-family: var(--font-display);
        -webkit-font-smoothing: antialiased;
    }

    .kit-demo {
        max-width: 1000px;
        margin: 4rem auto;
        padding: 0 1.5rem 6rem; /* respiro extra no rodapé p/ o tooltip do hover não cortar */
    }

    /* ---- Cabeçalho da seção ---- */
    .kit-head {
        margin-bottom: 1.75rem;
    }

    .kit-eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 0.45rem;
        font-size: 0.7rem;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--green-dark);
        margin: 0 0 0.55rem;
    }
    .kit-eyebrow::before {
        content: "";
        width: 22px;
        border-top: 1.5px dashed var(--green);
    }

    .kit-title {
        font-size: 1.9rem;
        font-weight: 800;
        letter-spacing: -0.01em;
        margin: 0 0 0.4rem;
        color: var(--black);
    }

    .kit-sub {
        font-size: 0.95rem;
        color: var(--gray-dark);
        margin: 0;
        max-width: 56ch;
        line-height: 1.5;
    }

    /* ---- Fileira de tiles BEM justa ---- */
    .kit-rail {
        display: flex;
        flex-wrap: wrap;
        gap: 0.55rem;
        align-items: center;
        padding-top: 0.5rem;
    }

    /* ---- O tile micro (pegada de botão pequeno) ---- */
    .kit-tile {
        position: relative;
        width: 54px;
        height: 54px;
        flex: 0 0 auto;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1.5px dashed var(--green);
        border-radius: var(--radius);
        background: var(--paper-bg);
        color: var(--green-dark);
        cursor: pointer;
        text-decoration: none;
        transition:
            transform 180ms var(--ease-out-quart, ease),
            box-shadow 180ms var(--ease-out-quart, ease),
            border-color 180ms var(--ease-out-quart, ease),
            background-color 180ms var(--ease-out-quart, ease);
    }

    /* glifo do formato (ícone de linha) */
    .kit-tile svg {
        width: 26px;
        height: 26px;
        stroke: currentColor;
        fill: none;
        stroke-width: 1.6;
        stroke-linecap: round;
        stroke-linejoin: round;
        transition: transform 180ms var(--ease-out-quart, ease);
    }

    /* índice discreto no canto — ordem do kit */
    .kit-tile .kit-num {
        position: absolute;
        top: 3px;
        left: 6px;
        font-size: 0.58rem;
        font-weight: 700;
        line-height: 1;
        color: var(--gray-dark);
        opacity: 0.65;
        font-variant-numeric: tabular-nums;
    }

    /* ---- Estado HOVER (elevação, borda sólida verde) ---- */
    .kit-tile:hover,
    .kit-tile:focus-visible,
    .kit-tile.is-hover {
        transform: translateY(-3px);
        border-style: solid;
        border-color: var(--green);
        background: var(--surface-hover);
        box-shadow: 0 6px 16px -6px var(--green);
        outline: none;
    }
    .kit-tile:hover svg,
    .kit-tile:focus-visible svg,
    .kit-tile.is-hover svg {
        transform: scale(1.06);
    }
    .kit-tile:hover .kit-num,
    .kit-tile.is-hover .kit-num {
        color: var(--green-dark);
        opacity: 0.9;
    }

    /* ---- Tooltip elegante (etiqueta) via ::after / data-attr ---- */
    .kit-tile::before,  /* a setinha */
    .kit-tile::after {  /* a etiqueta */
        position: absolute;
        bottom: calc(100% + 10px);
        left: 50%;
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        transition: opacity 160ms var(--ease-out-quart, ease),
                    transform 160ms var(--ease-out-quart, ease),
                    visibility 160ms;
        z-index: 5;
    }

    .kit-tile::after {
        content: attr(data-label) " · " attr(data-spec);
        transform: translate(-50%, 4px);
        white-space: nowrap;
        padding: 0.5rem 0.75rem;
        background: var(--black);
        color: var(--paper-bg);
        border-radius: var(--radius);
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.01em;
        box-shadow: 0 8px 22px -8px rgba(0,0,0,0.45);
    }

    /* o "·" e o spec ganham um tom verde claro p/ hierarquia dentro da etiqueta */
    .kit-tile::before {
        content: "";
        bottom: calc(100% + 4px);
        width: 0;
        height: 0;
        transform: translate(-50%, 4px);
        border-left: 6px solid transparent;
        border-right: 6px solid transparent;
        border-top: 6px solid var(--black);
    }

    .kit-tile:hover::after,
    .kit-tile:hover::before,
    .kit-tile:focus-visible::after,
    .kit-tile:focus-visible::before,
    .kit-tile.is-hover::after,
    .kit-tile.is-hover::before {
        opacity: 1;
        visibility: visible;
        transform: translate(-50%, 0);
    }

    /* ---- separador sutil + ação de baixar tudo ---- */
    .kit-rail-divider {
        width: 1px;
        align-self: stretch;
        margin: 0.15rem 0.2rem;
        border-left: 1.5px dashed var(--gray-light, var(--surface-hover));
    }

    .kit-foot {
        margin-top: 1.4rem;
        font-size: 0.78rem;
        color: var(--gray-dark);
        display: flex;
        align-items: center;
        gap: 0.45rem;
    }
    .kit-foot svg {
        width: 15px; height: 15px;
        stroke: var(--green); fill: none; stroke-width: 1.7;
        stroke-linecap: round; stroke-linejoin: round;
    }
</style>
</head>
<body>

<div class="kit-demo">
    <header class="kit-head">
        <p class="kit-eyebrow">Compartilhe este livro</p>
        <h2 class="kit-title">Kit de Divulgação</h2>
        <p class="kit-sub">Seis peças prontas para baixar. Passe o mouse sobre cada selo para ver o destino e o formato.</p>
    </header>

    <div class="kit-rail" role="list" aria-label="Peças do kit de divulgação">

        <!-- 1. Citação — Feed — 4:5 (retrato) -->
        <a class="kit-tile is-hover" role="listitem" href="#"
           data-label="Citação · Feed" data-spec="1080×1350 · 4:5"
           title="Citação — Instagram · Feed — 1080×1350 — 4:5">
            <span class="kit-num">01</span>
            <!-- glifo: aspas em moldura retrato (4:5) -->
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <rect x="6.5" y="3.5" width="11" height="17" rx="1.5"/>
                <path d="M9.5 9.5c-1.1 0-1.8.8-1.8 1.8 0 .9.6 1.5 1.4 1.5.8 0 1.3-.5 1.3-1.2 0-1.4-1.2-1.5-.9-2.7"/>
                <path d="M14 9.5c-1.1 0-1.8.8-1.8 1.8 0 .9.6 1.5 1.4 1.5.8 0 1.3-.5 1.3-1.2 0-1.4-1.2-1.5-.9-2.7"/>
            </svg>
        </a>

        <!-- 2. Citação — Stories — 9:16 (vertical alto) -->
        <a class="kit-tile" role="listitem" href="#"
           data-label="Citação · Stories" data-spec="1080×1920 · 9:16"
           title="Citação — Stories — 1080×1920 — 9:16">
            <span class="kit-num">02</span>
            <!-- glifo: aspas em moldura bem vertical (9:16) -->
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <rect x="8" y="2.5" width="8" height="19" rx="1.5"/>
                <path d="M10.5 9c-1 0-1.6.7-1.6 1.6 0 .8.5 1.3 1.2 1.3.7 0 1.1-.4 1.1-1 0-1.3-1-1.4-.8-2.4"/>
                <path d="M14.4 9c-1 0-1.6.7-1.6 1.6 0 .8.5 1.3 1.2 1.3.7 0 1.1-.4 1.1-1 0-1.3-1-1.4-.8-2.4"/>
            </svg>
        </a>

        <!-- 3. Ideia-chave — Feed Quadrado — 1:1 -->
        <a class="kit-tile" role="listitem" href="#"
           data-label="Ideia-chave · Quadrado" data-spec="1080×1080 · 1:1"
           title="Ideia-chave — Feed · Quadrado — 1080×1080 — 1:1">
            <span class="kit-num">03</span>
            <!-- glifo: lâmpada (ideia) em moldura quadrada (1:1) -->
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <rect x="4" y="4" width="16" height="16" rx="1.5"/>
                <path d="M12 8a3 3 0 0 0-1.8 5.4c.4.3.6.6.6 1.1h2.4c0-.5.2-.8.6-1.1A3 3 0 0 0 12 8Z"/>
                <path d="M10.8 16.2h2.4"/>
            </svg>
        </a>

        <span class="kit-rail-divider" aria-hidden="true"></span>

        <!-- 4. Capa — Stories — 9:16 -->
        <a class="kit-tile" role="listitem" href="#"
           data-label="Capa · Stories" data-spec="1080×1920 · 9:16"
           title="Capa — Stories — 1080×1920 — 9:16">
            <span class="kit-num">04</span>
            <!-- glifo: capa de livro em moldura vertical alta (9:16) -->
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <rect x="8" y="2.5" width="8" height="19" rx="1.5"/>
                <line x1="10" y1="2.5" x2="10" y2="21.5"/>
                <path d="M11.6 7.5h2.6M11.6 10h2.6"/>
            </svg>
        </a>

        <!-- 5. Capa do livro — Geral — 2:3 -->
        <a class="kit-tile" role="listitem" href="#"
           data-label="Capa do livro · Geral" data-spec="800×1200 · 2:3"
           title="Capa do livro — Geral — 800×1200 — 2:3">
            <span class="kit-num">05</span>
            <!-- glifo: capa de livro com lombada em moldura 2:3 -->
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <rect x="6.5" y="3.5" width="11" height="17" rx="1.5"/>
                <line x1="9" y1="3.5" x2="9" y2="20.5"/>
                <path d="M11 8h4.5M11 11h4.5"/>
            </svg>
        </a>

        <!-- 6. Banner de link — Facebook · WhatsApp — 1.91:1 (paisagem) -->
        <a class="kit-tile" role="listitem" href="#"
           data-label="Banner de link · FB·WhatsApp" data-spec="1200×630 · 1.91:1"
           title="Banner de link — Facebook · WhatsApp — 1200×630 — 1.91:1">
            <span class="kit-num">06</span>
            <!-- glifo: elo de corrente em moldura paisagem larga (1.91:1) -->
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <rect x="3" y="7.5" width="18" height="9" rx="1.5"/>
                <path d="M10.5 12H8.6a1.4 1.4 0 0 1 0-2.8h1.9M13.5 12h1.9a1.4 1.4 0 0 1 0 2.8h-1.9"/>
                <line x1="9.4" y1="12" x2="14.6" y2="12"/>
            </svg>
        </a>

    </div>

    <p class="kit-foot">
        <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 3v12"/><path d="M8 11l4 4 4-4"/><path d="M5 21h14"/>
        </svg>
        Toque em um selo para gerar e baixar a imagem.
    </p>
</div>

</body>
</html>
