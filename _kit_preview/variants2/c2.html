<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visualizador de carrossel — C2 Coverflow</title>
<link rel="stylesheet" href="../../assets/style.css">
<style>
  /* ===== Palco da demo (fundo claro/papel da Biblioteca) ===== */
  .cv-demo {
    position: relative;
    min-height: 100vh;
    background: var(--paper-bg);
    font-family: var(--font-display);
    overflow: hidden;
  }
  /* gatilho de exemplo ao fundo, só para dar contexto ao screenshot */
  .cv-demo__bg {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
  }
  .cv-trigger {
    appearance: none;
    border: 1.5px dashed var(--green);
    background: var(--paper-bg);
    color: var(--green-dark);
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 1rem;
    padding: .7rem 1.4rem;
    border-radius: var(--radius);
    cursor: pointer;
  }

  /* ===== Overlay (lightbox aberto) ===== */
  .cv-overlay {
    position: absolute;
    inset: 0;
    z-index: 50;
    background: rgba(8, 14, 11, 0.86);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: clamp(1rem, 4vh, 2.4rem) 1rem;
  }

  .cv-overlay__head {
    width: 100%;
    max-width: 1100px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    margin-bottom: clamp(.8rem, 2.4vh, 1.6rem);
    color: oklch(96% 0.01 152);
  }
  .cv-overlay__title {
    display: flex;
    align-items: center;
    gap: .6rem;
    font-weight: 700;
    font-size: clamp(.95rem, 1.4vw, 1.1rem);
    letter-spacing: -0.01em;
  }
  .cv-overlay__pill {
    font-size: .72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: oklch(22% 0.01 152);
    background: var(--green);
    border-radius: 999px;
    padding: .22rem .6rem;
  }
  .cv-close {
    appearance: none;
    border: 1.5px solid rgba(255,255,255,0.28);
    background: transparent;
    color: oklch(96% 0.01 152);
    width: 38px;
    height: 38px;
    border-radius: 999px;
    cursor: pointer;
    display: grid;
    place-items: center;
    transition: border-color .18s, background .18s;
  }
  .cv-close:hover { border-color: var(--green); background: rgba(255,255,255,0.06); }
  .cv-close svg { width: 18px; height: 18px; }

  /* ===== Coverflow stage ===== */
  .cv-stage {
    position: relative;
    width: 100%;
    max-width: 1100px;
    height: 70vh;
    display: flex;
    align-items: center;
    justify-content: center;
    perspective: 1600px;
  }
  .cv-track {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    transform-style: preserve-3d;
  }

  /* cada slide é 4:5 */
  .cv-slide {
    position: absolute;
    top: 50%;
    left: 50%;
    height: 100%;
    aspect-ratio: 4 / 5;
    border-radius: 14px;
    overflow: hidden;
    background: oklch(18% 0.01 152);
    box-shadow: 0 24px 60px rgba(0,0,0,0.55);
    transition: transform .45s cubic-bezier(.22,.61,.36,1),
                opacity .45s ease,
                filter .45s ease;
    will-change: transform, opacity;
    cursor: pointer;
  }
  .cv-slide img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    pointer-events: none;
    user-select: none;
  }

  /* posições do coverflow — espreitada lateral */
  .cv-slide[data-pos="center"] {
    transform: translate(-50%, -50%) translateZ(80px) scale(1);
    opacity: 1;
    filter: none;
    z-index: 30;
    box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.05);
  }
  .cv-slide[data-pos="prev"] {
    transform: translate(-50%, -50%) translateX(-58%) rotateY(26deg) scale(0.82);
    opacity: 0.45;
    filter: brightness(0.6) saturate(0.85);
    z-index: 20;
  }
  .cv-slide[data-pos="next"] {
    transform: translate(-50%, -50%) translateX(58%) rotateY(-26deg) scale(0.82);
    opacity: 0.45;
    filter: brightness(0.6) saturate(0.85);
    z-index: 20;
  }
  .cv-slide[data-pos="far-prev"] {
    transform: translate(-50%, -50%) translateX(-92%) rotateY(34deg) scale(0.68);
    opacity: 0.12;
    filter: brightness(0.45);
    z-index: 10;
  }
  .cv-slide[data-pos="far-next"] {
    transform: translate(-50%, -50%) translateX(92%) rotateY(-34deg) scale(0.68);
    opacity: 0.12;
    filter: brightness(0.45);
    z-index: 10;
  }
  .cv-slide[data-pos="hidden"] {
    transform: translate(-50%, -50%) scale(0.5);
    opacity: 0;
    pointer-events: none;
    z-index: 1;
  }

  /* contador do slide central */
  .cv-counter {
    position: absolute;
    bottom: 12px;
    right: 14px;
    z-index: 31;
    background: rgba(8,14,11,0.6);
    color: oklch(96% 0.01 152);
    font-size: .72rem;
    font-weight: 700;
    padding: .2rem .55rem;
    border-radius: 999px;
    pointer-events: none;
  }

  /* ===== Setas ===== */
  .cv-arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    z-index: 40;
    width: 52px;
    height: 52px;
    border-radius: 999px;
    border: 1.5px solid rgba(255,255,255,0.25);
    background: rgba(8,14,11,0.55);
    color: oklch(96% 0.01 152);
    cursor: pointer;
    display: grid;
    place-items: center;
    transition: background .18s, border-color .18s, transform .18s;
  }
  .cv-arrow:hover { border-color: var(--green); background: var(--green-dark); }
  .cv-arrow svg { width: 22px; height: 22px; }
  .cv-arrow--prev { left: clamp(.5rem, 3vw, 2rem); }
  .cv-arrow--next { right: clamp(.5rem, 3vw, 2rem); }

  /* ===== Rodapé: dots + downloads ===== */
  .cv-foot {
    width: 100%;
    max-width: 1100px;
    margin-top: clamp(.9rem, 2.6vh, 1.7rem);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: clamp(.8rem, 2vh, 1.3rem);
  }
  .cv-dots {
    display: flex;
    align-items: center;
    gap: .55rem;
  }
  .cv-dot {
    appearance: none;
    border: none;
    width: 9px;
    height: 9px;
    border-radius: 999px;
    background: rgba(255,255,255,0.28);
    cursor: pointer;
    padding: 0;
    transition: background .18s, width .18s;
  }
  .cv-dot:hover { background: rgba(255,255,255,0.55); }
  .cv-dot[aria-current="true"] {
    background: var(--green);
    width: 24px;
  }

  .cv-actions {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
    gap: .7rem;
  }
  .cv-btn {
    appearance: none;
    font-family: var(--font-display);
    font-weight: 700;
    font-size: .9rem;
    border-radius: var(--radius);
    padding: .65rem 1.2rem;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: .5rem;
    transition: transform .15s, filter .18s, background .18s;
  }
  .cv-btn svg { width: 17px; height: 17px; }
  .cv-btn:active { transform: translateY(1px); }
  .cv-btn--primary {
    background: var(--green);
    color: oklch(22% 0.01 152);
    border: 1.5px solid var(--green);
  }
  .cv-btn--primary:hover { filter: brightness(1.08); }
  .cv-btn--ghost {
    background: transparent;
    color: oklch(96% 0.01 152);
    border: 1.5px dashed rgba(255,255,255,0.4);
  }
  .cv-btn--ghost:hover { border-color: var(--green); color: var(--green); }

  @media (max-width: 640px) {
    .cv-stage { height: 58vh; }
    .cv-arrow { width: 44px; height: 44px; }
    .cv-slide[data-pos="prev"]  { transform: translate(-50%, -50%) translateX(-66%) rotateY(24deg) scale(0.78); }
    .cv-slide[data-pos="next"]  { transform: translate(-50%, -50%) translateX(66%) rotateY(-24deg) scale(0.78); }
  }
</style>
</head>
<body>
<div class="cv-demo">

  <!-- contexto ao fundo (página de capítulo) -->
  <div class="cv-demo__bg" aria-hidden="true">
    <button class="cv-trigger">Gerar carrossel</button>
  </div>

  <!-- Lightbox JÁ ABERTO -->
  <div class="cv-overlay" role="dialog" aria-modal="true" aria-label="Visualizador de carrossel">

    <div class="cv-overlay__head">
      <div class="cv-overlay__title">
        <span class="cv-overlay__pill">Carrossel</span>
        <span>Capítulo 1 — 5 slides</span>
      </div>
      <button class="cv-close" aria-label="Fechar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>

    <div class="cv-stage">
      <button class="cv-arrow cv-arrow--prev" aria-label="Slide anterior">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
      </button>

      <div class="cv-track" id="cvTrack">
        <!-- estado para o screenshot: slide 02 ao centro, 01 prev, 03 next -->
        <div class="cv-slide" data-index="0" data-pos="prev"><img src="slides/01.png" alt="Slide 1"></div>
        <div class="cv-slide" data-index="1" data-pos="center">
          <img src="slides/02.png" alt="Slide 2">
          <span class="cv-counter">2 / 5</span>
        </div>
        <div class="cv-slide" data-index="2" data-pos="next"><img src="slides/03.png" alt="Slide 3"></div>
        <div class="cv-slide" data-index="3" data-pos="far-next"><img src="slides/04.png" alt="Slide 4"></div>
        <div class="cv-slide" data-index="4" data-pos="hidden"><img src="slides/05.png" alt="Slide 5"></div>
      </div>

      <button class="cv-arrow cv-arrow--next" aria-label="Próximo slide">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
      </button>
    </div>

    <div class="cv-foot">
      <div class="cv-dots" id="cvDots">
        <button class="cv-dot" data-go="0" aria-label="Ir ao slide 1"></button>
        <button class="cv-dot" data-go="1" aria-current="true" aria-label="Ir ao slide 2"></button>
        <button class="cv-dot" data-go="2" aria-label="Ir ao slide 3"></button>
        <button class="cv-dot" data-go="3" aria-label="Ir ao slide 4"></button>
        <button class="cv-dot" data-go="4" aria-label="Ir ao slide 5"></button>
      </div>

      <div class="cv-actions">
        <button class="cv-btn cv-btn--primary" id="cvZip">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg>
          Baixar carrossel (.zip)
        </button>
        <button class="cv-btn cv-btn--ghost" id="cvOne">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg>
          Baixar slide
        </button>
      </div>
    </div>

  </div>
</div>

<script>
(function () {
  const TOTAL = 5;
  const SRC = ['slides/01.png','slides/02.png','slides/03.png','slides/04.png','slides/05.png'];
  let current = 1; // arranca no slide 02 (índice 1)

  const slides = Array.from(document.querySelectorAll('.cv-slide'));
  const dots = Array.from(document.querySelectorAll('.cv-dot'));
  const track = document.getElementById('cvTrack');

  function posFor(i) {
    const d = i - current;
    if (d === 0) return 'center';
    if (d === -1) return 'prev';
    if (d === 1) return 'next';
    if (d === -2) return 'far-prev';
    if (d === 2) return 'far-next';
    return 'hidden';
  }

  function render() {
    slides.forEach((el, i) => {
      el.dataset.pos = posFor(i);
      const counter = el.querySelector('.cv-counter');
      if (counter) counter.remove();
      if (i === current) {
        const c = document.createElement('span');
        c.className = 'cv-counter';
        c.textContent = (current + 1) + ' / ' + TOTAL;
        el.appendChild(c);
      }
    });
    dots.forEach((d, i) => {
      if (i === current) d.setAttribute('aria-current', 'true');
      else d.removeAttribute('aria-current');
    });
  }

  function go(i) {
    current = Math.max(0, Math.min(TOTAL - 1, i));
    render();
  }

  // navegação
  document.querySelector('.cv-arrow--prev').addEventListener('click', () => go(current - 1));
  document.querySelector('.cv-arrow--next').addEventListener('click', () => go(current + 1));
  dots.forEach(d => d.addEventListener('click', () => go(parseInt(d.dataset.go, 10))));
  slides.forEach(el => el.addEventListener('click', () => {
    const i = parseInt(el.dataset.index, 10);
    if (i !== current) go(i);
  }));

  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft') go(current - 1);
    else if (e.key === 'ArrowRight') go(current + 1);
  });

  // downloads (slide atual)
  function download(href, name) {
    const a = document.createElement('a');
    a.href = href; a.download = name;
    document.body.appendChild(a); a.click(); a.remove();
  }
  document.getElementById('cvOne').addEventListener('click', () => {
    download(SRC[current], 'slide-0' + (current + 1) + '.png');
  });
  document.getElementById('cvZip').addEventListener('click', () => {
    // sem libs externas: dispara o download de cada slide como fallback honesto
    SRC.forEach((s, i) => setTimeout(() => download(s, 'slide-0' + (i + 1) + '.png'), i * 200));
  });

  render();
})();
</script>
</body>
</html>
