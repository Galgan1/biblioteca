<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visualizador de Carrossel — C3 (Palco + trilho)</title>
<link rel="stylesheet" href="../../assets/style.css">
<style>
  /* ====== C3 — Palco + trilho de miniaturas ======
     Overlay escuro; um slide grande no palco (4:5, ~62vh) e,
     embaixo, um trilho horizontal com as 5 miniaturas clicáveis. */

  .cv-demo {
    min-height: 100vh;
    background: var(--body-bg);
    font-family: var(--font-display);
    color: var(--black);
  }

  /* --- Overlay escuro (lightbox) --- */
  .cv-overlay {
    position: fixed;
    inset: 0;
    z-index: 1000;
    display: flex;
    flex-direction: column;
    align-items: center;
    background: oklch(18% 0.012 152 / 0.92);
    backdrop-filter: blur(8px) saturate(115%);
    -webkit-backdrop-filter: blur(8px) saturate(115%);
    padding: clamp(0.75rem, 2.2vh, 1.6rem) 1rem;
    overflow: hidden;
  }

  /* --- Cabeçalho do visualizador --- */
  .cv-head {
    width: 100%;
    max-width: 880px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    color: oklch(97% 0.005 152);
    flex: 0 0 auto;
  }
  .cv-title {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    min-width: 0;
  }
  .cv-title .cv-dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 0 4px oklch(52% 0.14 152 / 0.18);
    flex: 0 0 auto;
  }
  .cv-title h2 {
    font-size: var(--text-md);
    font-weight: 700;
    letter-spacing: -0.01em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .cv-title .cv-sub {
    font-size: var(--text-xs);
    color: oklch(80% 0.02 152);
    font-weight: 500;
    white-space: nowrap;
  }
  .cv-close {
    flex: 0 0 auto;
    width: 38px; height: 38px;
    display: grid; place-items: center;
    border-radius: 50%;
    border: 1.5px dashed oklch(75% 0.02 152 / 0.55);
    background: transparent;
    color: oklch(92% 0.01 152);
    cursor: pointer;
    transition: background .18s var(--ease-out-quart), border-color .18s, transform .18s;
  }
  .cv-close:hover {
    background: oklch(40% 0.012 152 / 0.6);
    border-color: var(--green);
    transform: rotate(90deg);
  }
  .cv-close svg { width: 18px; height: 18px; }

  /* --- Palco (slide grande) --- */
  .cv-stage {
    flex: 1 1 auto;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: clamp(0.5rem, 1.6vw, 1rem);
    width: 100%;
    max-width: 880px;
    margin: clamp(0.6rem, 1.6vh, 1.1rem) 0;
    min-height: 0;
  }

  .cv-nav {
    flex: 0 0 auto;
    width: 44px; height: 44px;
    display: grid; place-items: center;
    border-radius: 50%;
    border: 1.5px solid oklch(70% 0.02 152 / 0.4);
    background: oklch(30% 0.012 152 / 0.55);
    color: oklch(96% 0.008 152);
    cursor: pointer;
    transition: background .18s var(--ease-out-quart), border-color .18s, transform .18s;
  }
  .cv-nav:hover {
    background: var(--green);
    border-color: var(--green);
    transform: scale(1.06);
  }
  .cv-nav svg { width: 20px; height: 20px; }

  .cv-frame {
    position: relative;
    height: 62vh;
    aspect-ratio: 4 / 5;
    max-width: 100%;
    border-radius: var(--radius);
    overflow: hidden;
    background: oklch(14% 0.01 152);
    box-shadow:
      0 0 0 1.5px oklch(52% 0.14 152 / 0.5),
      0 18px 50px oklch(0% 0 0 / 0.55);
  }
  .cv-frame img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  /* Contador 02 / 05 sobre o palco */
  .cv-counter {
    position: absolute;
    top: 12px; left: 12px;
    font-size: var(--text-xs);
    font-weight: 700;
    letter-spacing: 0.04em;
    color: oklch(99% 0.002 152);
    background: oklch(18% 0.012 152 / 0.7);
    border: 1px solid oklch(52% 0.14 152 / 0.6);
    padding: 4px 10px;
    border-radius: 999px;
    backdrop-filter: blur(4px);
  }
  .cv-counter b { color: var(--green); }

  /* --- Trilho de miniaturas --- */
  .cv-rail {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: clamp(0.45rem, 1.1vw, 0.8rem);
    width: 100%;
    max-width: 880px;
    padding: 0.35rem 0.25rem 0.15rem;
    overflow-x: auto;
  }
  .cv-thumb {
    position: relative;
    flex: 0 0 auto;
    width: clamp(56px, 7.2vw, 78px);
    aspect-ratio: 4 / 5;
    border-radius: 5px;
    overflow: hidden;
    cursor: pointer;
    border: 2px solid transparent;
    background: oklch(14% 0.01 152);
    opacity: 0.62;
    transition: opacity .18s var(--ease-out-quart), transform .18s, border-color .18s;
  }
  .cv-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .cv-thumb:hover {
    opacity: 0.9;
    transform: translateY(-2px);
  }
  .cv-thumb .cv-thumb-n {
    position: absolute;
    bottom: 3px; right: 4px;
    font-size: 0.6rem;
    font-weight: 700;
    color: oklch(99% 0.002 152);
    background: oklch(18% 0.012 152 / 0.72);
    padding: 1px 5px;
    border-radius: 999px;
    line-height: 1.4;
  }
  .cv-thumb.is-active {
    opacity: 1;
    border-color: var(--green);
    box-shadow: 0 0 0 3px oklch(52% 0.14 152 / 0.22), 0 6px 16px oklch(0% 0 0 / 0.4);
    transform: translateY(-2px);
  }
  .cv-thumb.is-active .cv-thumb-n {
    background: var(--green);
    color: var(--on-green);
  }

  /* --- Barra de ações (baixar) --- */
  .cv-actions {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
    gap: 0.6rem;
    margin-top: clamp(0.55rem, 1.6vh, 1rem);
  }
  .cv-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    font-family: var(--font-display);
    font-size: var(--text-sm);
    font-weight: 600;
    letter-spacing: -0.005em;
    padding: 0.62rem 1.05rem;
    border-radius: 999px;
    cursor: pointer;
    border: 1.5px solid transparent;
    transition: background .18s var(--ease-out-quart), border-color .18s, transform .18s, color .18s;
  }
  .cv-btn svg { width: 16px; height: 16px; }
  .cv-btn--ghost {
    background: transparent;
    border-color: oklch(75% 0.02 152 / 0.5);
    color: oklch(95% 0.008 152);
  }
  .cv-btn--ghost:hover {
    border-color: var(--green);
    color: var(--green);
    transform: translateY(-1px);
  }
  .cv-btn--solid {
    background: var(--green);
    color: var(--on-green);
    border-color: var(--green);
  }
  .cv-btn--solid:hover {
    background: var(--green-dark);
    border-color: var(--green-dark);
    transform: translateY(-1px);
  }

  @media (max-width: 560px) {
    .cv-frame { height: 52vh; }
    .cv-nav { width: 38px; height: 38px; }
    .cv-title .cv-sub { display: none; }
  }
</style>
</head>
<body>
<div class="cv-demo">

  <!-- Visualizador JÁ ABERTO (estado de screenshot: slide 02 no palco) -->
  <div class="cv-overlay" role="dialog" aria-modal="true" aria-label="Visualizador de carrossel">

    <!-- Cabeçalho -->
    <header class="cv-head">
      <div class="cv-title">
        <span class="cv-dot"></span>
        <h2>Carrossel do capítulo</h2>
        <span class="cv-sub">· 5 slides · 1080×1350</span>
      </div>
      <button class="cv-close" aria-label="Fechar" onclick="cvClose()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M6 6l12 12M18 6L6 18"/>
        </svg>
      </button>
    </header>

    <!-- Palco: slide grande + setas -->
    <div class="cv-stage">
      <button class="cv-nav" aria-label="Slide anterior" onclick="cvGo(cvIndex-1)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 5l-7 7 7 7"/>
        </svg>
      </button>

      <figure class="cv-frame">
        <span class="cv-counter"><b id="cvCur">02</b> / 05</span>
        <img id="cvStageImg" src="slides/02.png" alt="Slide 2 do carrossel">
      </figure>

      <button class="cv-nav" aria-label="Próximo slide" onclick="cvGo(cvIndex+1)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 5l7 7-7 7"/>
        </svg>
      </button>
    </div>

    <!-- Trilho de miniaturas (a 02 destacada) -->
    <nav class="cv-rail" id="cvRail" aria-label="Miniaturas dos slides">
      <button class="cv-thumb" data-i="1" onclick="cvGo(1)">
        <img src="slides/01.png" alt="Miniatura do slide 1"><span class="cv-thumb-n">01</span>
      </button>
      <button class="cv-thumb is-active" data-i="2" onclick="cvGo(2)">
        <img src="slides/02.png" alt="Miniatura do slide 2"><span class="cv-thumb-n">02</span>
      </button>
      <button class="cv-thumb" data-i="3" onclick="cvGo(3)">
        <img src="slides/03.png" alt="Miniatura do slide 3"><span class="cv-thumb-n">03</span>
      </button>
      <button class="cv-thumb" data-i="4" onclick="cvGo(4)">
        <img src="slides/04.png" alt="Miniatura do slide 4"><span class="cv-thumb-n">04</span>
      </button>
      <button class="cv-thumb" data-i="5" onclick="cvGo(5)">
        <img src="slides/05.png" alt="Miniatura do slide 5"><span class="cv-thumb-n">05</span>
      </button>
    </nav>

    <!-- Ações -->
    <div class="cv-actions">
      <button class="cv-btn cv-btn--ghost" onclick="cvBaixarSlide()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 3v12m0 0l-4-4m4 4l4-4M4 19h16"/>
        </svg>
        Baixar este slide
      </button>
      <button class="cv-btn cv-btn--solid" onclick="cvBaixarZip()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 4h7l2 2h7v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z"/>
          <path d="M12 11v5m0 0l-2-2m2 2l2-2"/>
        </svg>
        Baixar carrossel (.zip)
      </button>
    </div>

  </div>
</div>

<script>
  var cvIndex = 2;
  var cvTotal = 5;

  function cvPad(n){ return (n < 10 ? '0' : '') + n; }

  function cvGo(i){
    if (i < 1) i = cvTotal;
    if (i > cvTotal) i = 1;
    cvIndex = i;
    var p = cvPad(i);
    document.getElementById('cvStageImg').src = 'slides/' + p + '.png';
    document.getElementById('cvStageImg').alt = 'Slide ' + i + ' do carrossel';
    document.getElementById('cvCur').textContent = p;
    var thumbs = document.querySelectorAll('.cv-thumb');
    thumbs.forEach(function(t){
      t.classList.toggle('is-active', Number(t.dataset.i) === i);
    });
  }

  function cvClose(){
    var ov = document.querySelector('.cv-overlay');
    if (ov) ov.style.display = 'none';
  }

  function cvBaixarSlide(){
    var p = cvPad(cvIndex);
    var a = document.createElement('a');
    a.href = 'slides/' + p + '.png';
    a.download = 'carrossel-slide-' + p + '.png';
    document.body.appendChild(a); a.click(); a.remove();
  }

  function cvBaixarZip(){
    // No produto real: dispara o empacotamento .zip dos 5 slides no servidor.
    alert('Empacotando os 5 slides em .zip…');
  }

  document.addEventListener('keydown', function(e){
    if (e.key === 'ArrowLeft') cvGo(cvIndex - 1);
    else if (e.key === 'ArrowRight') cvGo(cvIndex + 1);
    else if (e.key === 'Escape') cvClose();
  });
</script>
</body>
</html>
