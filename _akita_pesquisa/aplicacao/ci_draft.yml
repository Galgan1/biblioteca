# =============================================================================
# CI DRAFT — Proposta da lane C02 (Akita pilar 5: gate bloqueante completo).
# NÃO é o workflow ativo. NÃO copiar para .github/ sem o aval do GitGuy/Bibliotecario
# (já existe .github/workflows/ci.yml de OUTRA lane — ver C02_ci.md, seção Risco).
#
# Ordem do gate (Akita [A04]): estilo/lint -> segurança (secret scan) -> testes.
# Vermelho em qualquer etapa bloqueia o merge. master só fica verde com tudo verde.
#
# PRÉ-REQUISITOS para este YAML ficar verde (NÃO existem ainda no repo — ver C02_ci.md):
#   1. Config ruff commitada (pyproject.toml [tool.ruff]) com `select`/`exclude`
#      enxutos — senão `ruff check` = 489 erros e `ruff format --check` = 294 arquivos.
#   2. `testar.py` (ponto único idempotente, proposto pela lane C01) na raiz.
#      Enquanto não existir, o job de testes usa o fallback unittest atual.
# =============================================================================
name: CI (DRAFT C02)

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  # -------------------------------------------------------------------------
  # 1) ESTILO / LINT  — ruff check + ruff format --check
  #    Verificação local (exit code): ver C02_ci.md.
  # -------------------------------------------------------------------------
  lint:
    name: estilo (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Instalar ruff (versão fixada = a mesma do local)
        run: pip install "ruff==0.15.17"
      - name: ruff check (lint)
        run: ruff check .
      - name: ruff format --check (formatação, não altera arquivos)
        run: ruff format --check .

  # -------------------------------------------------------------------------
  # 2) SEGURANÇA  — secret scan (gitleaks). Pega chave/token versionado por engano.
  #    O .gitignore já barra *.key/*.pem/*token*/*.env, mas o gitleaks é a REDE:
  #    varre o histórico, não só o working tree.
  # -------------------------------------------------------------------------
  secret-scan:
    name: segurança (secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # histórico completo: gitleaks varre todos os commits
      - name: gitleaks (detect)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"

  # -------------------------------------------------------------------------
  # 3) TESTES  — ponto único idempotente (Akita: comando único, output parseável).
  #    Preferência: `python testar.py` (lane C01). Fallback: o discover atual.
  # -------------------------------------------------------------------------
  testes:
    name: mural do caminho critico
    runs-on: ubuntu-latest
    needs: [lint, secret-scan]    # só roda testes se estilo e segurança passarem
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Instalar dependencias de teste
        run: pip install -r requirements-dev.txt
      - name: Rodar a bateria (ponto único, se existir)
        run: |
          if [ -f testar.py ]; then
            python testar.py
          else
            cd videos && python -m unittest discover -s tests -t .
          fi
